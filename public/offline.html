<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ไม่มีการเชื่อมต่ออินเทอร์เน็ต</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f5f7f2;
        color: #1f2937;
        font-family: "Noto Sans Thai", system-ui, sans-serif;
      }
      .card {
        width: min(480px, calc(100% - 2rem));
        background: #ffffff;
        border: 1px solid #d7e2d4;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 8px 30px rgba(38, 66, 42, 0.08);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.4rem;
      }
      p {
        margin: 0;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <section class="card">
      <h1>ขณะนี้ออฟไลน์อยู่</h1>
      <p>ไม่สามารถเชื่อมต่อเครือข่ายได้ กรุณาลองใหม่เมื่อมีสัญญาณอินเทอร์เน็ต</p>
    </section>
  </body>
</html>
